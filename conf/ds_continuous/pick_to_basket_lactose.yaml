defaults:
  - config
  - _self_

name: 'pick_to_basket_lactose'
output_dir: demo_envs/pick_to_basket_lactose
rewrite: true
num_scenes: 10
num_workers: 2

random_seed: 73

active_shelvings_list:
  - name: 'mixed_shelf'
    filling_type: BOARDWISE_COLUMNS
    x_gap: 0.06
    y_gap: 0.02
    delta_x: 0.1
    shelf_asset: fixtures.shelf_metal
    shuffle_boards: True
    shuffle_items_on_board: True
    board_product_numcol:
      0:
        food.MILK.OatlyMilk: 3
        food.MILK.DailyFreshMilkNatural: 2
        food.MILK.MilkBioNonVegan: 2
        food.MILK.AuchanLeiteMagroMilk: 2
      1:
        food.YOGHURTS.ShoburtisimoYogurt: 2
        food.YOGHURTS.ChobaniYogurt: 2
        food.YOGHURTS.GreekDrinkingYogurt: 2
      2:
        food.drinks.cocaColaCan: 2
        food.drinks.fanta: 2
        food.drinks.pepsi: 2
      3:
        food.CHIPS.PringlesOriginal: 2
        food.CHIPS.PaprikaPotatoChips: 2
        food.CHIPS.PringlesCheddarCheese: 2
