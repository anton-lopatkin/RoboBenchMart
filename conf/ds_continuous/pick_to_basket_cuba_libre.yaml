    x_gap: 0.06
    y_gap: 0.02
    delta_x: 0.1
    shelf_asset: fixtures.shelf_metal
    shuffle_boards: True
    shuffle_items_on_board: True
    board_product_numcol:
      0:
        food.STRONG_ALCO.HavanaClubRum: 3
