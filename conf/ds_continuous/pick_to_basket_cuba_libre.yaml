        food.STRONG_ALCO.BombaySapphireDryGin: 2
        food.STRONG_ALCO.OlmecaTequila: 2
      1:
        food.drinks.cocaColaCan: 3
        food.drinks.pepsi: 2
        food.drinks.fanta: 2
        food.drinks.sprite2p25l: 2
      2:
        food.BEER.HeinekenLagerBeerBottle: 2
        food.BEER.CoronaExtraBeerBottle: 2
        food.BEER.DuffBeerCan: 2
        food.BEER.AsahiBeerBottle: 2
      3:
        food.CHIPS.PringlesOriginal: 2
        food.CHIPS.PaprikaPotatoChips: 2
        food.SWEET.Nutella: 2
        food.SWEET.RaspberryJam: 2
